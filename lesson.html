<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson | EnglishBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Newsreader:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="platform.css">
  <style>

    .lesson-shell {
      width: min(calc(100% - 32px), 1280px);
      margin: 0 auto;
      padding: 28px 0 80px;
      display: grid;
      gap: 24px;
    }

    .lesson-hero {
      border-radius: 28px;
      padding: 38px 44px;
      background: linear-gradient(145deg, rgba(255,251,246,0.97), rgba(249,240,227,0.92));
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      position: relative;
    }

    .lesson-hero::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(80,58,40,0.07);
      border-radius: 20px;
      pointer-events: none;
    }

    .lesson-hero h1 {
      font-family: "Newsreader", serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.1;
      margin: 10px 0 14px;
    }

    .lesson-hero p { color: var(--muted); line-height: 1.75; }

    /* ── SIDE-BY-SIDE LAYOUT ── */
    .lesson-main-grid {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 24px;
      align-items: start;
    }

    .lesson-body {
      border-radius: 24px;
      padding: 30px 34px;
      background: linear-gradient(145deg, rgba(255,251,246,0.95), rgba(249,240,227,0.9));
      border: 1px solid rgba(255,255,255,0.68);
      box-shadow: var(--shadow);
    }

    .lesson-body h2 {
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--accent-deep);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    .question-stack { display: grid; gap: 16px; }

    .question-card {
      padding: 22px 24px;
      border-radius: 18px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(80,58,40,0.1);
    }

    .question-card.speech-card {
      border-color: rgba(111,124,74,0.28);
      background: linear-gradient(135deg, rgba(111,124,74,0.07), rgba(255,255,255,0.65));
    }

    .speech-record-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 20px;
      border-radius: 999px;
      border: 2px solid rgba(111,124,74,0.35);
      background: rgba(111,124,74,0.1);
      color: #3a5018;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .speech-record-btn:hover { background: rgba(111,124,74,0.18); }

    .speech-record-btn.recording {
      background: rgba(200,50,50,0.1);
      border-color: rgba(200,50,50,0.45);
      color: #8b1a1a;
      animation: pulse-ring 1.5s infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,50,50,0.2); }
      50%       { box-shadow: 0 0 0 8px rgba(200,50,50,0); }
    }

    .speech-transcript-box {
      margin-top: 10px;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1px solid rgba(111,124,74,0.2);
      background: rgba(255,255,255,0.75);
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
      min-height: 64px;
    }

    .speech-status {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 6px;
      min-height: 18px;
    }

    /* ── BUDDY CHAT SIDEBAR ── */
    .buddy-sidebar {
      position: sticky;
      top: 88px;
      border-radius: 26px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: linear-gradient(170deg, #16082e 0%, #261054 45%, #121840 100%);
      box-shadow:
        0 32px 80px rgba(22,8,46,0.45),
        0 0 0 1px rgba(150,100,255,0.2),
        inset 0 1px 0 rgba(255,255,255,0.08);
      max-height: calc(100vh - 108px);
    }

    /* Header */
    .buddy-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 13px;
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }

    .buddy-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.25), 0 6px 18px rgba(139,92,246,0.4);
    }

    .buddy-header-info { flex: 1; min-width: 0; }

    .buddy-header-info strong {
      display: block;
      font-size: 1rem;
      font-weight: 800;
      color: #f5f0ff;
      letter-spacing: 0.01em;
    }

    .buddy-header-info span {
      font-size: 0.75rem;
      color: rgba(196,181,253,0.6);
    }

    .buddy-status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .buddy-online-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74,222,128,0.8);
      flex-shrink: 0;
    }

    .buddy-online-label {
      font-size: 0.7rem;
      color: rgba(74,222,128,0.8);
      font-weight: 700;
    }

    /* Chat body */
    .buddy-chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 260px;
      max-height: 460px;
      scrollbar-width: thin;
      scrollbar-color: rgba(167,139,250,0.25) transparent;
    }

    .buddy-chat-body::-webkit-scrollbar { width: 4px; }
    .buddy-chat-body::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.25); border-radius: 4px; }

    .buddy-msg {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 88%;
      animation: buddySlideUp 0.22s ease;
    }

    @keyframes buddySlideUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .buddy-msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .buddy-bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.65;
    }

    .buddy-msg.bot .buddy-bubble {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.09);
      color: #ede9fe;
      border-bottom-left-radius: 5px;
    }

    .buddy-msg.user .buddy-bubble {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 5px;
      box-shadow: 0 4px 16px rgba(124,58,237,0.45);
    }

    .buddy-typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 11px 15px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      width: fit-content;
    }

    .buddy-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(196,181,253,0.7);
      animation: buddyBounce 1.3s infinite;
    }
    .buddy-dot:nth-child(2) { animation-delay: 0.18s; }
    .buddy-dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes buddyBounce {
      0%,60%,100% { transform:translateY(0); opacity:0.35; }
      30% { transform:translateY(-6px); opacity:1; }
    }

    /* Divider between chat and input */
    .buddy-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      flex-shrink: 0;
    }

    /* Input row */
    .buddy-input-row {
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    .buddy-input {
      flex: 1;
      min-height: 42px;
      max-height: 100px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.07);
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.55;
      color: #f0ebff;
      caret-color: #a78bfa;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .buddy-input::placeholder { color: rgba(196,181,253,0.35); }

    .buddy-input:focus {
      border-color: rgba(139,92,246,0.5);
      background: rgba(255,255,255,0.1);
    }

    .buddy-send {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(124,58,237,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .buddy-send:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(124,58,237,0.65); }
    .buddy-send:disabled { opacity: 0.38; cursor: default; transform: none; box-shadow: none; }
    .buddy-send:active  { transform: scale(0.93); }

    /* Footer */
    .buddy-footer {
      padding: 9px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.69rem;
      color: rgba(196,181,253,0.28);
      border-top: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    /* ── RE-LEARN SECTION ── */
    .relearn-section {
      border-radius: 26px;
      overflow: hidden;
      background: linear-gradient(135deg, #0f2027 0%, #1a3a4a 50%, #0f2027 100%);
      border: 1px solid rgba(56,189,248,0.25);
      box-shadow: 0 20px 60px rgba(15,32,39,0.5), 0 0 0 1px rgba(56,189,248,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .relearn-header {
      padding: 22px 28px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid rgba(56,189,248,0.1);
      flex-wrap: wrap;
    }

    .relearn-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .relearn-icon {
      width: 50px; height: 50px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(56,189,248,0.25), rgba(99,102,241,0.3));
      border: 1px solid rgba(56,189,248,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(56,189,248,0.15);
    }

    .relearn-title-block strong {
      display: block;
      font-size: 1.1rem;
      font-weight: 800;
      color: #e0f2fe;
      letter-spacing: 0.01em;
    }

    .relearn-title-block span {
      font-size: 0.78rem;
      color: rgba(147,197,253,0.65);
    }

    .relearn-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 999px;
      border: 1.5px solid rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.1);
      color: #7dd3fc;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .relearn-toggle-btn:hover {
      background: rgba(56,189,248,0.2);
      border-color: rgba(56,189,248,0.6);
      color: #bae6fd;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(56,189,248,0.2);
    }

    .relearn-toggle-btn.loading {
      opacity: 0.7;
      cursor: default;
      transform: none;
    }

    .relearn-body {
      padding: 0 28px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease, padding 0.3s ease;
    }

    .relearn-body.open {
      max-height: 900px;
      padding: 24px 28px 28px;
    }

    .relearn-content {
      color: #cbd5e1;
      font-size: 0.93rem;
      line-height: 1.8;
    }

    .relearn-content .rl-section {
      margin-bottom: 20px;
    }

    .relearn-content .rl-section:last-child { margin-bottom: 0; }

    .relearn-content .rl-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7dd3fc;
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(56,189,248,0.12);
    }

    .relearn-content ul {
      list-style: none;
      padding: 0; margin: 0;
      display: grid;
      gap: 7px;
    }

    .relearn-content ul li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .relearn-content ul li::before {
      content: "→";
      color: #38bdf8;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .relearn-content .rl-example {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(56,189,248,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      font-style: italic;
      color: #a5f3fc;
      margin-bottom: 7px;
    }

    .relearn-loading {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
      color: rgba(147,197,253,0.7);
      font-size: 0.9rem;
    }

    .rl-spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(56,189,248,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: rlSpin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes rlSpin { to { transform: rotate(360deg); } }

    /* ── HINT BUTTON on questions ── */
    .q-hint-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.76rem;
      font-weight: 700;
      color: #b45309;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.25);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 8px;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .q-hint-btn:hover {
      background: rgba(251,191,36,0.16);
      border-color: rgba(251,191,36,0.4);
    }

    .hint-bubble {
      margin-bottom: 12px;
      padding: 11px 14px;
      border-radius: 12px;
      background: rgba(251,191,36,0.07);
      border: 1px solid rgba(251,191,36,0.22);
      font-size: 0.88rem;
      line-height: 1.65;
      color: #78350f;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .lesson-main-grid { grid-template-columns: 1fr; }
      .buddy-sidebar { position: static; max-height: 440px; }
    }

    @media (max-width: 640px) {
      .lesson-hero { padding: 26px 22px; }
      .lesson-body { padding: 22px 18px; }
      .relearn-header { padding: 18px 18px 14px; }
      .relearn-body.open { padding: 18px 18px 22px; }
    }
  </style>
</head>
<body>

<div class="platform-shell">

  <header class="platform-header">
    <div class="platform-brand">
      <div class="platform-brand-mark" style="overflow:hidden;background:transparent;border:none;box-shadow:none;padding:2px;">
        <img src="https://api.logo.com/api/v2/images?design=lg_hwt2cBy6LwvoVHvFsi&u=1777398156000&width=1200&height=1200&margins=200&fit=contain&format=webp&quality=60&tightBounds=true" alt="EnglishBridge logo" style="width:100%;height:100%;object-fit:contain;">
      </div>
      <div class="platform-brand-copy">
        <strong>EnglishBridge</strong>
        <span>Lesson</span>
      </div>
    </div>
    <button class="header-chip" onclick="goBack()">← Back to Dashboard</button>
  </header>

  <div class="lesson-shell">

    <div class="lesson-hero">
      <p class="panel-label">Now Learning</p>
      <h1 id="lessonTitle"></h1>
      <p id="lessonDescription"></p>
    </div>

    <!-- RE-LEARN WITH AI SECTION (full width, above the grid) -->
    <div class="relearn-section" id="relearnSection" style="display:none;">
      <div class="relearn-header">
        <div class="relearn-header-left">
          <div class="relearn-icon">📖</div>
          <div class="relearn-title-block">
            <strong>Forgot something? Re-Learn with AI</strong>
            <span>Get a quick, personalised recap before you answer</span>
          </div>
        </div>
        <button class="relearn-toggle-btn" id="relearnToggleBtn" onclick="toggleRelearn()">
          ✨ Start Re-Learning
        </button>
      </div>
      <div class="relearn-body" id="relearnBody">
        <div class="relearn-content" id="relearnContent"></div>
      </div>
    </div>

    <div class="lesson-main-grid">

      <!-- QUESTIONS COLUMN -->
      <div class="lesson-body">
        <h2>Questions</h2>
        <div class="question-stack" id="questionStack"></div>
      </div>

      <!-- BUDDY CHAT SIDEBAR -->
      <div class="buddy-sidebar" id="buddySidebar">

        <div class="buddy-header">
          <div class="buddy-avatar">🤖</div>
          <div class="buddy-header-info">
            <strong>Buddy</strong>
            <div class="buddy-status-row">
              <div class="buddy-online-dot"></div>
              <span class="buddy-online-label">Online · Your AI Tutor</span>
            </div>
          </div>
        </div>

        <div class="buddy-chat-body" id="buddyBody"></div>

        <div class="buddy-divider"></div>

        <div class="buddy-input-row">
          <textarea
            class="buddy-input"
            id="buddyInput"
            placeholder="Ask Buddy anything…"
            rows="1"
            onkeydown="handleBuddyKey(event)"
          ></textarea>
          <button class="buddy-send" id="buddySendBtn" onclick="sendBuddy()" title="Send">➤</button>
        </div>

        <div class="buddy-footer">
          ✦ Powered by Groq AI &nbsp;·&nbsp; Here to help you learn 🌟
        </div>

      </div>

    </div>
  </div>

</div>

<script src="Api.js"></script>
<script src="lesson.js"></script>
<script>
function goBack() { window.location.href = "platform.html"; }
</script>

</body>
</html>
